name: "CI: test and build github-runner-autoscaler"
on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    name: "Test autoscaler"
    runs-on: ubuntu-latest
    steps:
      - name: "Clone repository"
        uses: actions/checkout@v4
      - name: "Set up Go"
        uses: actions/setup-go@v5
        with:
          go-version-file: runner-autoscaler/go.mod
          cache-dependency-path: runner-autoscaler/go.sum
      - name: "Run unit tests"
        working-directory: runner-autoscaler
        # Skip tests that require real GCP/GitHub credentials. Any new unit test
        # is picked up automatically; only credentialed ones need listing here.
        run: |
          go test -v -count=1 ./test/... \
            -skip '^(TestCreateCallbackTask|TestGenerateRunnerJitConfig|TestDeleteNotExistingVM)$'

  build_docker_image:
    name: "Build (and push on master) autoscaler image"
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: "Clone repository"
        uses: actions/checkout@v4
      - name: "Compute version and docker tags"
        id: meta
        run: |
          IMAGE=ghcr.io/commander-finance/github-runner-autoscaler
          VERSION=$(date -u '+%y.%m.%d.%H%M%S')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          TAGS="${IMAGE}:sha-${GITHUB_SHA}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:master"
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
            TAGS="${TAGS}"$'\n'"${IMAGE}:${VERSION}"
          fi
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: "Login to ghcr.io"
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: "Build and (conditionally) push Docker image"
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: runner-autoscaler
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          sbom: false
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
      - name: "Create GitHub release"
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.version }}" \
            --title "${{ steps.meta.outputs.version }}" \
            --notes "Automated release. Image: ghcr.io/commander-finance/github-runner-autoscaler:${{ steps.meta.outputs.version }}" \
            --target "${GITHUB_SHA}"
      - name: "Delete untagged Docker images"
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/delete-package-versions@v5
        with:
          package-name: github-runner-autoscaler
          package-type: container
          delete-only-untagged-versions: true
          min-versions-to-keep: 0
