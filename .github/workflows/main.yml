name: "CI: test and build github-runner-autoscaler"
on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    name: "Test autoscaler"
    runs-on: ubuntu-latest
    steps:
      - name: "Clone repository"
        uses: actions/checkout@v4
      - name: "Set up Go"
        uses: actions/setup-go@v5
        with:
          go-version-file: runner-autoscaler/go.mod
          cache-dependency-path: runner-autoscaler/go.sum
      - name: "Run unit tests"
        working-directory: runner-autoscaler
        # Skip tests that require real GCP/GitHub credentials. Any new unit test
        # is picked up automatically; only credentialed ones need listing here.
        run: |
          go test -v -count=1 ./test/... \
            -skip '^(TestCreateCallbackTask|TestGenerateRunnerJitConfig|TestDeleteNotExistingVM)$'

  ghcr_digest_smoke:
    name: "ghcr.io digest resolution smoke test"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      - name: "Write fixture"
        run: |
          mkdir -p /tmp/ghcr-digest-fixture
          cat > /tmp/ghcr-digest-fixture/main.tf <<'EOF'
          terraform {
            required_providers {
              docker = { source = "kreuzwerker/docker", version = "~>4.0" }
            }
          }
          provider "docker" {
            alias = "ghcr_anonymous"
            registry_auth {
              address       = "ghcr.io"
              auth_disabled = true
            }
          }
          data "docker_registry_image" "probe" {
            provider = docker.ghcr_anonymous
            name     = "ghcr.io/commander-finance/github-runner-autoscaler:master"
          }
          output "digest" { value = data.docker_registry_image.probe.sha256_digest }
          EOF
      - name: "Plan (scratch HOME, no docker config)"
        working-directory: /tmp/ghcr-digest-fixture
        env:
          # Belt-and-suspenders isolation: kreuzwerker/docker also consults
          # these vars in addition to ~/.docker/config.json. Clearing them
          # ensures the aliased-provider retry path is actually exercised
          # even if a future runner image exports one of them globally.
          DOCKER_CONFIG: ""
          DOCKER_HOST: ""
          DOCKER_CONTEXT: ""
        run: |
          HOME=$(mktemp -d) terraform init
          HOME=$(mktemp -d) terraform plan -out=tfplan
          HOME=$(mktemp -d) terraform show -json tfplan | jq -e '.planned_values.outputs.digest.value | startswith("sha256:")'

  module_validate:
    name: "Module terraform init+validate"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      - name: "Write consuming-root fixture"
        run: |
          mkdir -p /tmp/module-validate/root
          # Unquoted heredoc: $GITHUB_WORKSPACE must be expanded here.
          cat > /tmp/module-validate/root/main.tf <<EOF
          provider "google" {
            # Dummy values: terraform validate does not hit cloud APIs,
            # but declaring the provider explicitly keeps validate output
            # clean and makes the fixture's intent obvious.
            project = "validate-only"
            region  = "us-central1"
            zone    = "us-central1-a"
          }
          module "runner" {
            source              = "${GITHUB_WORKSPACE}"
            github_repositories = ["test/test"]
          }
          EOF
      - name: "terraform init && terraform validate"
        working-directory: /tmp/module-validate/root
        run: |
          HOME=$(mktemp -d) terraform init
          HOME=$(mktemp -d) terraform validate

  build_docker_image:
    name: "Build (and push on master) autoscaler image"
    needs: [test, ghcr_digest_smoke, module_validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: "Clone repository"
        uses: actions/checkout@v4
      - name: "Compute version and docker tags"
        id: meta
        run: |
          IMAGE=ghcr.io/commander-finance/github-runner-autoscaler
          VERSION=$(date -u '+%y.%m.%d.%H%M%S')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          TAGS="${IMAGE}:sha-${GITHUB_SHA}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:master"
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
            TAGS="${TAGS}"$'\n'"${IMAGE}:${VERSION}"
          fi
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: "Login to ghcr.io"
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: "Build and (conditionally) push Docker image"
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: runner-autoscaler
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          sbom: false
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
      - name: "Create GitHub release"
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.version }}" \
            --title "${{ steps.meta.outputs.version }}" \
            --notes "Automated release. Image: ghcr.io/commander-finance/github-runner-autoscaler:${{ steps.meta.outputs.version }}" \
            --target "${GITHUB_SHA}"
      - name: "Delete untagged Docker images"
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/delete-package-versions@v5
        with:
          package-name: github-runner-autoscaler
          package-type: container
          delete-only-untagged-versions: true
          min-versions-to-keep: 0
